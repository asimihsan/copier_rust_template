_updatable: true
_subdirectory: template

project_name:
  type: str
  help: "Enter the human-friendly name for your project."
  default: "My Awesome Project"

include_wasm:
  type: bool
  default: true
  help: "Include WebAssembly and web frontend components?"

include_go:
  type: bool
  default: true
  help: "Include Go language bindings?"

include_python:
  type: bool
  default: true
  help: "Include Python language bindings?"

include_web:
  type: bool
  default: true
  help: "Include web frontend components?"

include_web_leptos:
  type: bool
  default: true
  help: "Include web frontend components using Leptos?"

project_slug:
  type: str
  help: "Enter a project slug (lowercase, dash-separated)."
  default: "{{ project_name | lower | replace(' ', '-') }}"

project_slug_underscore:
  type: str
  help: "Enter a project slug (lowercase, underscore-separated)."
  default: "{{ project_name | lower | replace(' ', '_') }}"

author_name:
  type: str
  help: "Enter the author's name."
  default: "Your Name"

github_username:
  type: str
  help: "Enter your GitHub username."
  default: "your-username"

_exclude:
  - ".git"
  - "__skip_wasm__"
  - "__skip_web__"
  - "__skip_web_leptos__"
  - "__skip_python__"
  - "__skip_go__"
  - "__skip_go_wasm__"
