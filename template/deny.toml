[graph]
all-features = true

[advisories]
# advisory DB configuration
db-path    = "~/.cargo/advisory-db"
db-urls    = ["https://github.com/rustsec/advisory-db"]

# choose how to treat unmaintained advisories: all|workspace|transitive|none
unmaintained = "workspace"

# what to do on yanked crates: deny|warn|allow
yanked       = "deny"

[licenses]
# Permit common permissive licenses used by typical Rust ecosystem dependencies.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MPL-2.0",
  "CC0-1.0",
  "BSL-1.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Zlib",
  "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards         = "allow"
highlight         = "all"
