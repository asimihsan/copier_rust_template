# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: detect-private-key

  # Local hooks using our just commands
  - repo: local
    hooks:
      - id: rust-fmt
        name: Rust formatter
        entry: just format
        types: [rust]
        language: system
        pass_filenames: false

      - id: rust-check-format
        name: Rust format check
        entry: just check-format
        types: [rust]
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: rust-clippy
        name: Rust clippy
        entry: just check-clippy
        types: [rust]
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: web-lint
        name: Web lint and format
        entry: just web-lint
        types: [javascript, ts, jsx, tsx]
        language: system
        pass_filenames: false

      - id: copyright-check
        name: Copyright check
        entry: just copyright-check
        types: [rust, javascript, ts, jsx, tsx]
        language: system
        pass_filenames: false
